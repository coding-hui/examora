services:
  postgres:
    image: postgres:16
    container_name: examora-postgres
    environment:
      POSTGRES_USER: examora
      POSTGRES_PASSWORD: examora
      POSTGRES_DB: examora_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: examora-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  postgres_data:
