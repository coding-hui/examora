services:
  postgres:
    image: postgres:16
    container_name: examora-postgres
    environment:
      POSTGRES_USER: examora
      POSTGRES_PASSWORD: examora
      POSTGRES_DB: examora_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: examora-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  examora-sandbox:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.sandbox
    container_name: examora-sandbox
    ports:
      - "8081:8081"

  examora-api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.api
    container_name: examora-api
    depends_on:
      - postgres
      - redis
      - examora-sandbox
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_DSN: host=postgres user=examora password=examora dbname=examora_dev port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      SANDBOX_ADDR: http://examora-sandbox:8081
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-}
      LOGTO_API_AUDIENCE: ${LOGTO_API_AUDIENCE:-}
    ports:
      - "8080:8080"

  examora-worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
    container_name: examora-worker
    depends_on:
      - postgres
      - redis
      - examora-sandbox
    environment:
      DATABASE_DSN: host=postgres user=examora password=examora dbname=examora_dev port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      SANDBOX_ADDR: http://examora-sandbox:8081

volumes:
  postgres_data:
